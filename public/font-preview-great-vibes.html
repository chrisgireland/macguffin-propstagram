<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Great Vibes font preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      padding: 2rem;
      max-width: 40rem;
      margin: 0 auto;
      background: #faf8f4;
      color: #1a1916;
    }
    h1 {
      font-family: "Great Vibes", cursive;
      font-size: 3.5rem;
      font-weight: normal;
      margin: 0 0 0.5rem 0;
      line-height: 1.2;
    }
    .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #757068;
      margin-bottom: 2rem;
    }
    .sample {
      font-family: "Great Vibes", cursive;
      font-size: 2rem;
      margin: 1rem 0;
    }
  </style>
</head>
<body>
  <p class="label">Great Vibes — script / calligraphic</p>
  <h1>MacGuffin</h1>
  <p class="sample">The quick brown fox jumps over the lazy dog.</p>
  <p class="sample">Films &amp; Propstagram</p>
</body>
</html>
